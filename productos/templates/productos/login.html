{% extends 'productos/base.html' %}

{% block content %}
<h2>Iniciar sesión</h2>
<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Usuario">
    <input type="password" name="password" placeholder="Contraseña">
    <button type="submit">Entrar</button>
</form>
{% endblock %}
